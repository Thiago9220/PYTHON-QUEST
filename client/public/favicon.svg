<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#020617" stroke="url(#neonGradient)" stroke-width="2"/>
  
  <!-- Stylized Python Snake (Simplified & Cyberpunk) -->
  <g filter="url(#glow)">
    <path d="M50 15 C35 15 32 25 32 30 C32 38 38 40 50 40 C62 40 65 45 65 55 C65 65 55 70 40 70 L40 85" 
          fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" />
    <path d="M50 15 C65 15 68 25 68 30 L68 40" 
          fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" />
    <circle cx="42" cy="25" r="3" fill="white" />
  </g>
  
  <!-- Terminal Prompt Symbol -->
  <path d="M70 70 L80 80 L70 90" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
